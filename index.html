const list=document.getElementById("businessList")
const trendingList=document.getElementById("trendingList")
const searchInput=document.getElementById("searchInput")
const noResults=document.getElementById("noResults")

function highlight(text,keyword){
if(!keyword) return text
const regex=new RegExp(`(${keyword})`,"gi")
return text.replace(regex,"<mark>$1</mark>")
}

function renderBusinesses(data,keyword=""){

list.innerHTML=""

noResults.classList.toggle("hidden",data.length!==0)

data.forEach(biz=>{

list.innerHTML+=`

<div class="card ${biz.curated ? 'curated-card' : ''} bg-white rounded-2xl shadow-md p-10 flex flex-col md:flex-row md:items-center md:justify-between gap-8">

<div>

<span class="text-xs font-mono text-gray-400">${biz.id}</span>

<h3 class="text-2xl font-semibold flex items-center mt-2">

${biz.curated ? `<span class="badge">CURATED</span>` : ""}

${highlight(biz.name,keyword)}

</h3>

<p class="text-gray-600 mt-3 max-w-xl">
${highlight(biz.about,keyword)}
</p>

</div>

<a href="${biz.whatsapp}"
class="px-8 py-3 border rounded-lg font-medium hover:bg-gray-900 hover:text-white transition">
WhatsApp
</a>

</div>
`
})

}

function renderTrending(){

const trending = businesses.filter(b=>b.trending)

trending.forEach(biz=>{

trendingList.innerHTML+=`

<div class="bg-gray-100 p-6 rounded-xl">

<p class="text-xs text-gray-500 mb-2">Trending</p>

<h3 class="text-xl font-semibold">${biz.name}</h3>

<p class="text-gray-600 mt-2">${biz.about}</p>

</div>
`
})

}

renderBusinesses(businesses)
renderTrending()

searchInput.addEventListener("input",()=>{

const keyword=searchInput.value.toLowerCase()

const filtered=businesses.filter(biz=>
biz.name.toLowerCase().includes(keyword)||
biz.about.toLowerCase().includes(keyword)
)

renderBusinesses(filtered,keyword)

})

const filterButtons=document.querySelectorAll(".filter-btn")

filterButtons.forEach(btn=>{

btn.addEventListener("click",()=>{

const category=btn.dataset.category

if(category==="all"){
renderBusinesses(businesses)
return
}

const filtered=businesses.filter(b=>b.category===category)

renderBusinesses(filtered)

})

})
