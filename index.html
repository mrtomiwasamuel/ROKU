<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROKU | Nigerian Business Directory</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}

mark {
  background: #fde68a;
  padding: 0 0.15rem;
  border-radius: 3px;
}

.badge {
  font-size: 11px;
  letter-spacing: 0.15em;
  border: 1px solid #b59f00;
  padding: 3px 8px;
  margin-right: 10px;
  color: #b59f00;
  font-weight: 600;
  border-radius: 6px;
}

.card {
  transition: all 0.25s ease;
}
.card:hover {
  transform: translateY(-4px);
  box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
}
</style>
</head>

<body class="bg-gray-100 text-gray-900">

<!-- HERO -->
<section class="min-h-screen flex items-center justify-center px-6 bg-white border-b">
  <div class="max-w-3xl text-center">
    <h1 class="text-6xl font-bold tracking-widest">ROKU</h1>
    <p class="text-xs tracking-[0.35em] text-gray-500 mt-3">BUSINESS DIRECTORY</p>
    <p class="text-xl text-gray-700 mt-10 mb-10">
      Discover Nigerian small businesses in one place.
    </p>
    <input id="searchInput" type="text" placeholder="Search by product, service, or vibe..."
      class="w-full px-6 py-4 border rounded-xl text-lg focus:outline-none focus:ring-2 focus:ring-gray-900">
  </div>
</section>

<!-- BUSINESSES -->
<section id="businesses" class="px-6 py-24">
  <div class="max-w-6xl mx-auto">
    <h2 class="text-4xl font-semibold mb-16">Businesses on ROKU</h2>
    <div id="businessList" class="grid gap-12"></div>
    <p id="noResults" class="hidden text-center text-gray-500 mt-20">
      No businesses match this search yet.
    </p>
  </div>
</section>

<!-- CTA -->
<section class="px-6 py-28 bg-white text-center border-t">
  <h2 class="text-4xl font-semibold mb-6">Own a business?</h2>
  <p class="text-gray-600 mb-10">
    Get listed on ROKU and reach customers across Nigeria.
  </p>
  <a href="https://wa.me/2347061150867"
     class="px-12 py-4 bg-gray-900 text-white font-medium rounded-lg shadow-lg">
     List Your Business
  </a>
</section>

<footer class="px-6 py-10 text-center text-gray-500">
  © 2026 ROKU
</footer>

<script>
// Businesses array
const businesses = [
  { name: "Swills Imagery", description: "Luxury photography focused on portraits, weddings, and storytelling.", whatsapp: "https://wa.me/message/TDYDRMP2LMZSD1", curated: false },
  { name: "Cupidfragrance", description: "Personalized perfume recommendations matched to your lifestyle.", whatsapp: "https://wa.me/message/FTIUWON6RHPCE1", curated: false },
  { name: "Tiarish Hairline and Fashionhub", description: "Hair, fashion pieces, accessories, fragrances, and jewelry.", whatsapp: "https://wa.me/message/6JJUYWWJVKSFF1", curated: false },
  { name: "GIFTYSOLES", description: "Unisex shoes designed for comfort and timeless style.", whatsapp: "https://wa.me/message/QHQYJJOP3D7JB1", curated: false },
  { name: "Ara Blingz", description: "Jewelry, watches, accessories, and engraved pieces.", whatsapp: "https://wa.me/message/4IUEYZHHP5ZMI1", curated: false },
  { name: "AfroLines Creations", description: "Afrocentric accessories and decor inspired by African culture.", whatsapp: "https://wa.link/ykojot", curated: false },
  { name: "Goddess Glam", description: "Beauty brand focused on lip artistry and expression.", whatsapp: "https://wa.me/+2347040916897", curated: false },
  { name: "AJ LUXURY", description: "Accessories that enhance beauty, confidence, and elegance.", whatsapp: "https://wa.me/message/AJBLBO376XGEC1", curated: false },
  { name: "Tomiwa Roberto Carlos Samuel", description: "Creative sessions and classes launching soon. Connect early.", whatsapp: "https://wa.me/message/YBB5YR7MT6DHJ1", curated: true },
  { name: "Tofams Tailored", description: "Bespoke kaftans, traditional wear, pants, and vintage shirts.", whatsapp: "https://wa.me/9063693389", curated: false },
  { name: "SEAFOODS BY IBUKUNOLUWA", description: "Premium dried seafoods prepared for quality and taste.", whatsapp: "https://wa.me/message/VSHDGDMRXYBQP1", curated: false },
  { name: "stikart", description: "I turn ideas into eye-catching visuals that speak louder than words.", whatsapp: "https://wa.me/+2348081867670", curated: false },
  { name: "Philz Autoz Limited", description: "Quality tyres, car servicing, maintenance, auto parts, vehicle upgrades, and project vehicle procurement.", whatsapp: "https://wa.me/23453333220", curated: false },
  { name: "J.babyalaga", description: "Traditional wedding compere, wrapping of eru iyawo, and alaga services.", whatsapp: "https://wa.me/+2347058775427", curated: true },
  { name: "Spark craft lighting NG", description: "Elegant, innovative lighting transforming spaces into breathtaking experiences.", whatsapp: "https://wa.me/+2348106715066", curated: false },
  { name: "THE DANIEL MEDIA (Daniel the Creative)", description: "From scroll-stopping graphics to mind-blowing concepts, we turn imagination into reality.", whatsapp: "https://wa.me/07073425041", curated: false },
  { name: "DonPope Studios", description: "Wedding shoots, business video ads, event coverage, photography, cinematography, and more.", whatsapp: "https://wa.me/+2348113270911", curated: false },
  { name: "Lore's Luxe", description: "Unique room decors and functional household appliances to elevate your space.", whatsapp: "https://wa.me/+2349025890143", curated: true },
  { name: "Bare and Bold Collection", description: "Sexy lingerie, nightwear, gym essentials, and swimwear designed to fit and make you feel bold.", whatsapp: "https://wa.me/+2347076761224", curated: false },
  { name: "Numbtothepain Hub (NTTP Hub)", description: "Clothing brand using creativity to elevate people's aura.", whatsapp: "https://wa.me/2349128435219", curated: false },
  { name: "Baddies Circle", description: "Luxury lash extensions and flawless pedicures to enhance your beauty.", whatsapp: "https://wa.me/2348169930246", curated: false },
  { name: "Appollo 88", description: "Premium voice-over solutions for commercials, IVR, and documentaries.", whatsapp: "https://wa.me/09030425552", curated: false },
  { name: "D CREATIVES", description: "Ad-ready content engineered to drive sales and expand audience reach.", whatsapp: "https://wa.me/2348137069370?text=Hello%2C%20I%E2%80%99m%20interested%20in%20your%20services%20my%20name%20is%20", curated: false }
];

// DOM elements
const list = document.getElementById("businessList");
const searchInput = document.getElementById("searchInput");
const noResults = document.getElementById("noResults");

// Highlight function
function highlight(text, keyword){
  if(!keyword) return text;
  const regex = new RegExp(`(${keyword})`, "gi");
  return text.replace(regex, "<mark>$1</mark>");
}

// Render businesses
function renderBusinesses(data, keyword=""){
  list.innerHTML = "";
  noResults.classList.toggle("hidden", data.length !== 0);

  data.forEach((biz, index) => {
    list.innerHTML += `
      <div class="card bg-white rounded-2xl shadow-md p-10 flex flex-col md:flex-row md:items-center md:justify-between gap-8">
        <div>
          <span class="text-xs font-mono text-gray-400">
            ${String(index + 1).padStart(2,"0")}
          </span>
          <h3 class="text-2xl font-semibold flex items-center mt-2">
            ${biz.curated ? `<span class="badge">CURATED</span>` : ""}
            ${highlight(biz.name, keyword)}
          </h3>
          <p class="text-gray-600 mt-3 max-w-xl">
            ${highlight(biz.description, keyword)}
          </p>
        </div>
        <a href="${biz.whatsapp}" class="px-8 py-3 border rounded-lg font-medium hover:bg-gray-900 hover:text-white transition">
          WhatsApp
        </a>
      </div>
    `;
  });
}

// Initial render
renderBusinesses(businesses);

// Search filter
searchInput.addEventListener("input", () => {
  const keyword = searchInput.value.toLowerCase();
  const filtered = businesses.filter(biz => 
    biz.name.toLowerCase().includes(keyword) || 
    biz.description.toLowerCase().includes(keyword)
  );
  renderBusinesses(filtered, keyword);
});
</script>
</body>
</html>
