<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ROKU | Nigerian Business Directory</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
}

mark{
  background:#fde68a;
  padding:0 0.15rem;
  border-radius:3px;
}

.badge{
  font-size:11px;
  letter-spacing:0.15em;
  background:linear-gradient(90deg,#d4af37,#f5d76e);
  color:#111;
  padding:4px 10px;
  margin-right:10px;
  border-radius:999px;
  font-weight:600;
}

.card{
  transition:all .25s ease;
}

.card:hover{
  transform:translateY(-4px);
  box-shadow:0 20px 40px rgba(0,0,0,.08);
}
</style>
</head>

<body class="bg-gray-100 text-gray-900">

<section class="min-h-screen flex items-center justify-center px-6 bg-white border-b">
<div class="max-w-3xl text-center">

<h1 class="text-6xl font-bold tracking-widest">ROKU</h1>

<p class="text-xs tracking-[0.35em] text-gray-500 mt-3">
BUSINESS DIRECTORY
</p>

<p class="text-xl text-gray-700 mt-10 mb-10">
Discover Nigerian small businesses in one place.
</p>

<input
id="searchInput"
type="text"
placeholder="Search by product, service, or vibe..."
class="w-full px-6 py-4 border rounded-xl text-lg focus:outline-none focus:ring-2 focus:ring-gray-900"
/>

</div>
</section>

<section id="businesses" class="px-6 py-24">
<div class="max-w-6xl mx-auto">

<h2 class="text-4xl font-semibold mb-16">Businesses on ROKU</h2>

<div id="businessList" class="grid gap-12"></div>

<p id="noResults" class="hidden text-center text-gray-500 mt-20">
No businesses match this search yet.
</p>

</div>
</section>

<footer class="px-6 py-10 text-center text-gray-500 border-t">
© 2026 ROKU
</footer>

<script>

const businesses = [

whatsapp:"https://wa.me/message/4IUEYZHHP5ZMI1" },

{ id:6, name:"AfroLines Creations",

about:"Premium dried seafoods prepared for quality and taste.",
whatsapp:"https://wa.me/message/VSHDGDMRXYBQP1" },

whatsapp:"http://wa.me/23476761224" }

];

const list=document.getElementById("businessList");
const searchInput=document.getElementById("searchInput");
const noResults=document.getElementById("noResults");

function highlight(text,keyword){
if(!keyword) return text;
const regex=new RegExp(`(${keyword})`,"gi");
return text.replace(regex,"<mark>$1</mark>");
}

function renderBusinesses(data,keyword=""){
list.innerHTML="";
noResults.classList.toggle("hidden",data.length!==0);

data.sort((a,b)=>a.id-b.id).forEach((biz)=>{

list.innerHTML+=`
<div class="card bg-white rounded-2xl shadow-md p-10 flex flex-col md:flex-row md:items-center md:justify-between gap-8">

<div>
<span class="text-xs font-mono text-gray-400">
${String(biz.id).padStart(2,"0")}
</span>

<h3 class="text-2xl font-semibold flex items-center mt-2">
${biz.curated ? `<span class="badge">CURATED</span>`:""}
${highlight(biz.name,keyword)}
</h3>

<p class="text-gray-600 mt-3 max-w-xl">
${highlight(biz.about,keyword)}
</p>
</div>

<a href="${biz.whatsapp}"
class="px-8 py-3 border rounded-lg font-medium hover:bg-gray-900 hover:text-white transition">
WhatsApp
</a>

</div>
`;
});

}

renderBusinesses(businesses);

searchInput.addEventListener("input",()=>{
const keyword=searchInput.value.toLowerCase();

const filtered=businesses.filter(biz=>
biz.name.toLowerCase().includes(keyword)||
biz.about.toLowerCase().includes(keyword)
);

renderBusinesses(filtered,keyword);
});

</script>
</body>
</html>
