-category="auto">Auto</button> </div> </div> </section> <section id="businesses" class="px-6 py-24"> <div class="max-w-6xl mx-auto"> <h2 class="text-4xl font-semibold mb-16"> Businesses on ROKU </h2> <div id="businessList" class="grid gap-12"></div> <p id="noResults" class="hidden text-center text-gray-500 mt-20"> No businesses match this search yet. </p> </div> </section> <section class="px-6 py-28 bg-white text-center border-t"> <h2 class="text-4xl font-semibold mb-6"> Own a business? </h2> <p class="text-gray-600 mb-10"> Get listed on ROKU and reach customers across Nigeria. </p> <a href="https://wa.me/2347061150867" class="px-12 py-4 bg-gray-900 text-white font-medium rounded-lg shadow-lg" > List Your Business </a> </section> <footer class="px-6 py-10 text-center text-gray-500"> © 2026 ROKU </footer> <script> const businesses = [ { id:"01", name:"Swills Imagery", category:"creative", about:"Luxury photography focused on portraits, weddings, and storytelling.", whatsapp:"https://wa.me/message/TDYDRMP2LMZSD1" }, { id:"02", name:"Cupidfragrance", category:"beauty", about:"Personalized perfume recommendations matched to your lifestyle.", whatsapp:"https://wa.me/message/FTIUWON6RHPCE1" }, { id:"03", name:"Tiarish Hairline and Fashionhub", category:"beauty", about:"Hair, fashion pieces, accessories, fragrances, and jewelry.", whatsapp:"https://wa.me/message/6JJUYWWJVKSFF1" }, { id:"04", name:"GIFTYSOLES", category:"fashion", about:"Unisex shoes designed for comfort and timeless style.", whatsapp:"https://wa.me/message/QHQYJJOP3D7JB1" }, { id:"05", name:"Ara Blingz", category:"fashion", about:"Jewelry, watches, accessories, and engraved pieces.", whatsapp:"https://wa.me/message/4IUEYZHHP5ZMI1" }, { id:"06", name:"AfroLines Creations", category:"fashion", about:"Afrocentric accessories and decor inspired by African culture.", whatsapp:"https://wa.link/ykojot" }, /* 07 removed permanently */ { id:"08", name:"AJ LUXURY", category:"fashion", about:"Accessories that enhance s designed for confidence and comfort.", whatsapp:"https://wa.me/+2347076761224" }, { id:"20", name:"Numbtothepain Hub", category:"fashion", about:"Clothing brand using creativity to elevate personal aura.", whatsapp:"https://wa.me/+2349167616915" }, { id:"21", name:"Baddies Circle", category:"beauty", about:"Luxury lash extensions with classic, hybrid, and volume sets plus premium pedicures.", whatsapp:"https://wa.me/2348169930246" }, { id:"22", name:"Appollo 88", category:"services", about:"Professional voice over talent for commercials, IVR systems, and documentaries.", whatsapp:"https://wa.me/09030425552" }, { id:"23", name:"D CREATIVES", category:"creative", about:"Ad ready content creation that drives sales and expands brand reach.", whatsapp:"https://wa.me/2348137069370" }, { id:"24", name:"Massive Cakes & Events", category:"services", about:"Your go-to brand for beautiful, delicious cakes crafted for celebrations and unforgettable events.", whatsapp:"https://wa.me/message/GLSVU52WNNJZC1", curated:true } ]; const list=document.getElementById("businessList") const searchInput=document.getElementById("searchInput") const noResults=document.getElementById("noResults") function highlight(text,keyword){ if(!keyword) return text const regex=new RegExp(`(${keyword})`,"gi") return text.replace(regex,"<mark>$1</mark>") } function renderBusinesses(data,keyword=""){ list.innerHTML="" noResults.classList.toggle("hidden",data.length!==0) data.forEach(biz=>{ list.innerHTML+=` <div class="card ${biz.curated ? 'curated-card' : ''} bg-white rounded-2xl shadow-md p-10 flex flex-col md:flex-row md:items-center md:justify-between gap-8"> <div> <span class="text-xs font-mono text-gray-400">${biz.id}</span> <h3 class="text-2xl font-semibold flex items-center mt-2"> ${biz.curated ? `<span class="badge">CURATED</span>` : ""} ${highlight(biz.name,keyword)} </h3> <p class="text-gray-600 mt-3 max-w-xl"> ${highlight(biz.about,keyword)} </p> </div> <a href="${biz.whatsapp}" class="px-8 py-3 border rounded-lg font-medium hover:bg-gray-900 hover:text-white transition"> WhatsApp </a> </div> ` }) } renderBusinesses(businesses) searchInput.addEventListener("input",()=>{ const keyword=searchInput.value.toLowerCase() const filtered=businesses.filter(biz => biz.name.toLowerCase().includes(keyword) || biz.about.toLowerCase().includes(keyword) ) renderBusinesses(filtered,keyword) }) const filterButtons=document.querySelectorAll(".filter-btn") filterButtons.forEach(btn=>{ btn.addEventListener("click",()=>{ const category=btn.dataset.category if(category==="all"){ renderBusinesses(businesses) return } const filtered=businesses.filter(b=>b.category===category) renderBusinesses(filtered) }) }) </script> </body> </html>
